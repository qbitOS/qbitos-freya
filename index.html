<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#050810">
  <title>FreyaUnits Start</title>
  <link rel="icon" type="image/png" sizes="32x32" href="favicon.png">
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
      font-family: -apple-system, "SF Pro Display", BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: radial-gradient(1000px 600px at 15% -20%, #2d1760, #0b1220 52%, #050810);
      color: #dbeafe;
    }
    .card {
      width: min(760px, 100%);
      border: 1px solid #2e4566;
      border-radius: 16px;
      background: rgba(12, 20, 33, 0.88);
      box-shadow: 0 10px 36px rgba(0, 0, 0, 0.45);
      padding: 24px 20px;
      text-align: center;
    }
    .tag {
      display: inline-block;
      border: 1px solid #3a5f8c;
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 10px;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: #9dc4f3;
      background: rgba(34, 65, 103, 0.34);
      margin-bottom: 12px;
    }
    h1 { margin: 0 0 8px; font-size: clamp(28px, 6vw, 44px); }
    p { margin: 0 0 12px; color: #b6cde6; line-height: 1.6; }
    .actions { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-top: 14px; }
    .btn {
      text-decoration: none;
      color: #e2efff;
      border: 1px solid #2f7bdb66;
      background: rgba(47, 123, 219, 0.24);
      border-radius: 999px;
      font-size: 12px;
      letter-spacing: .04em;
      padding: 8px 14px;
      white-space: nowrap;
    }
    .hint { margin-top: 12px; color: #8aa6c5; font-size: 12px; }
  </style>
  <meta http-equiv="refresh" content="0; url=freya-landing.html">
</head>
<body>
  <main class="card" aria-label="FreyaUnits start route">
    <span class="tag">FreyaUnits</span>
    <h1>Launching Landing Surface</h1>
    <p>The default Freya start route now opens the landing page first.</p>
    <div class="actions">
      <a class="btn" href="freya-landing.html">Open Landing</a>
      <a class="btn" href="freya-units.html">Open Full Converter</a>
      <a class="btn" href="freya-terminal.html">Open Terminal Lane</a>
    </div>
    <div class="hint">If redirect is blocked, use one of the buttons above.</div>
  </main>
  <script>
    (function () {
      if (location.pathname.endsWith("/index.html") || location.pathname === "/" || location.pathname === "") {
        location.replace("freya-landing.html");
      }
    })();
  </script>
</body>
</html>
