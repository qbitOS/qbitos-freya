# beyondBINARY quantum-prefixed | uvspeed | {n, +1, -n, +0, 0, -1, +n, +2, -0, +3, 1}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: freya-codex-api
  labels:
    app: freya-codex-api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: freya-codex-api
  minReplicas: 2
  maxReplicas: 12
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 65
