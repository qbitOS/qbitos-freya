# beyondBINARY quantum-prefixed | uvspeed | {n, +1, -n, +0, 0, -1, +n, +2, -0, +3, 1}
server {
    listen 80;
    listen [::]:80;
    server_name erika.qbitos.ai;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name erika.qbitos.ai;

    # Replace with your real certificate paths.
    ssl_certificate /etc/letsencrypt/live/erika.qbitos.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/erika.qbitos.ai/privkey.pem;

    client_max_body_size 5m;

    location /api/v1/ {
        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    location /health {
        proxy_pass http://127.0.0.1:8787/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}
